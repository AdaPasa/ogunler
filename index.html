<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öğünler">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Öğün Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#378ADD;--orange:#EF9F27;--pink:#D4537E;
  --red:#E24B4A;--bg:#0f1117;--card:#1a1d27;--card2:#22263a;
  --border:#2a2f45;--text:#f0f0f0;--sub:#8890aa;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:3rem}
.app{max-width:600px;margin:0 auto;padding:1rem}

/* HEADER */
.header{background:linear-gradient(135deg,#0f2027,#1a3a2a);border-radius:20px;padding:1.25rem 1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(29,158,117,0.2)}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(29,158,117,0.3),transparent 70%);border-radius:50%}
.header::after{content:'🍽️';position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:42px;opacity:0.15}
.header-top{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.streak{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:#fff;background:rgba(239,159,39,0.25);border:1px solid rgba(239,159,39,0.4);padding:5px 12px;border-radius:20px}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;background:var(--card);border-radius:14px;padding:8px 12px;border:1px solid var(--border)}
.week-nav button{background:none;border:none;font-size:18px;cursor:pointer;padding:6px 10px;border-radius:10px;color:var(--sub);transition:all 0.15s}
.week-nav button:hover{background:var(--card2);color:var(--text)}
.week-nav button:disabled{opacity:0.2;cursor:default}
.week-label{font-size:14px;font-weight:600;color:var(--text)}

/* KALORI KARTI */
.kalori-wrap{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:18px;padding:1.25rem;margin-bottom:1rem;border:1px solid var(--border);position:relative;overflow:hidden}
.kalori-wrap::before{content:'';position:absolute;bottom:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(29,158,117,0.15),transparent 70%);border-radius:50%}
.kalori-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.kalori-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px}
.kalori-hedef-btn{font-size:12px;color:var(--green);background:var(--green-light);background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.3);border-radius:10px;padding:4px 10px;cursor:pointer;font-weight:600}
.kalori-main{display:flex;align-items:baseline;gap:6px;margin-bottom:1rem}
.kalori-num{font-size:42px;font-weight:800;color:#fff;line-height:1;letter-spacing:-2px}
.kalori-unit{font-size:16px;color:var(--sub);font-weight:500}
.kalori-hedef-text{font-size:12px;color:var(--sub);margin-left:auto}
.kalori-bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.kalori-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#5DCAA5);transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.kalori-bar-fill.asildi{background:linear-gradient(90deg,var(--red),#ff6b6b)}

/* MAKRO KARTLAR */
.makro-row{display:flex;gap:8px}
.makro-kart{flex:1;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px;border:1px solid var(--border)}
.makro-icon{font-size:16px;margin-bottom:4px}
.makro-label{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.makro-val{font-size:18px;font-weight:800;margin:2px 0}
.makro-val.p{color:var(--blue)}
.makro-val.k{color:var(--orange)}
.makro-val.y{color:var(--pink)}
.makro-bar{height:3px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:4px}
.makro-bar-fill{height:100%;border-radius:99px;transition:width 0.6s}
.makro-bar-fill.p{background:var(--blue)}
.makro-bar-fill.k{background:var(--orange)}
.makro-bar-fill.y{background:var(--pink)}

/* PROGRESS */
.progress-wrap{background:var(--card);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid var(--border)}
.progress-header{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:500}
.progress-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#5DCAA5);transition:width 0.5s}

/* GÜN KARTLARI */
.days-grid{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--card);border-radius:18px;border:1px solid var(--border);overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s}
.day-card.day-done{border-color:var(--green);box-shadow:0 0 20px rgba(29,158,117,0.15)}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card2);border-bottom:1px solid var(--border)}
.day-left{display:flex;align-items:center;gap:8px}
.day-name{font-size:14px;font-weight:700;color:var(--text)}
.today-badge{font-size:10px;font-weight:700;color:var(--green-dark);background:var(--green-light);background:rgba(29,158,117,0.2);border:1px solid rgba(29,158,117,0.4);padding:2px 8px;border-radius:8px;color:var(--green)}
.day-date{font-size:12px;color:var(--sub)}
.day-right{display:flex;align-items:center;gap:8px}
.day-mini{display:flex;gap:4px}
.mini-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.3s}
.mini-dot.done{background:var(--green)}
.day-pct{font-size:12px;color:var(--sub);font-weight:600}
.day-meals{padding:12px 16px;display:flex;flex-direction:column;gap:14px}

/* ÖĞÜN BLOĞU */
.meal-block{display:flex;flex-direction:column;gap:6px}
.meal-block-header{display:flex;align-items:center;gap:10px}
.meal-check{width:26px;height:26px;flex-shrink:0;border:2px solid var(--border);border-radius:8px;transition:all 0.18s;background:var(--card2);position:relative;cursor:not-allowed}
.meal-check.ready{cursor:pointer;border-color:var(--green);box-shadow:0 0 8px rgba(29,158,117,0.3)}
.meal-check.ready:active{transform:scale(0.9)}
.meal-check.checked{background:var(--green);border-color:var(--green);cursor:pointer;box-shadow:0 0 12px rgba(29,158,117,0.4)}
.meal-check.checked::after{content:'';position:absolute;top:50%;left:50%;width:7px;height:11px;border:2.5px solid #fff;border-top:none;border-left:none;transform:translate(-50%,-62%) rotate(45deg)}
.meal-check.locked{opacity:0.25}
.meal-emoji{font-size:18px}
.meal-label{font-size:14px;font-weight:700;color:var(--text)}

/* YEMEK LİSTESİ */
.yemek-listesi{margin-left:36px;display:flex;flex-direction:column;gap:6px}
.yemek-satir{display:flex;align-items:center;gap:6px}
.yemek-input{flex:1;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:14px;background:var(--card2);color:var(--text);outline:none;min-width:0;transition:border-color 0.2s}
.yemek-input::placeholder{color:var(--sub)}
.yemek-input:focus{border-color:var(--green)}
.yemek-input.done-input{text-decoration:line-through;color:var(--sub)}
.kcal-badge{font-size:11px;font-weight:700;color:var(--green);background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.3);padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.bilinmiyor{font-size:11px;color:var(--sub);flex-shrink:0}
.sil-btn{width:22px;height:22px;border-radius:50%;background:var(--card2);color:var(--sub);border:1px solid var(--border);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.sil-btn:hover{background:rgba(226,75,74,0.2);color:var(--red);border-color:var(--red)}

.besin-detay{font-size:11px;color:var(--sub);display:flex;gap:8px;padding-left:2px}
.bd-p{color:var(--blue)}
.bd-k{color:var(--orange)}
.bd-y{color:var(--pink)}

.ekle-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;color:var(--green);background:rgba(29,158,117,0.1);border:1px dashed rgba(29,158,117,0.4);border-radius:10px;cursor:pointer;width:fit-content;margin-top:2px;margin-left:36px;font-weight:600;transition:all 0.15s}
.ekle-btn:hover{background:rgba(29,158,117,0.2)}

/* ÖĞÜN TOPLAM */
.meal-toplam-wrap{margin-left:36px;margin-top:4px;padding:8px 12px;background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.2);border-radius:10px;display:none}
.meal-toplam-wrap.visible{display:block}
.meal-toplam-kcal{font-size:12px;font-weight:700;color:var(--green);margin-bottom:3px}
.meal-toplam-makro{display:flex;gap:10px;font-size:11px;font-weight:600}

/* FOTOĞRAF */
.photo-area{margin-left:36px;display:flex;align-items:center;gap:8px;margin-top:4px}
.photo-cam-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--sub);border:1px dashed var(--border);border-radius:10px;cursor:pointer;background:var(--card2);transition:all 0.15s}
.photo-cam-btn:hover{border-color:var(--green);color:var(--green)}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb{width:60px;height:60px;object-fit:cover;border-radius:10px;border:2px solid var(--green);cursor:pointer}
.photo-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}

.hint{font-size:11px;color:var(--red);transition:opacity 0.3s;margin-left:36px;display:block;min-height:16px}

/* MODAL */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem}
.lightbox img{max-width:100%;max-height:85vh;border-radius:12px;object-fit:contain}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;z-index:10000;padding:1rem}
.modal-box{background:var(--card);border-radius:20px;width:100%;max-width:420px;overflow:hidden;border:1px solid var(--border)}
.modal-title{padding:14px 16px;font-size:13px;color:var(--sub);text-align:center;border-bottom:1px solid var(--border)}
.modal-btn{width:100%;padding:16px;border:none;background:transparent;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);color:var(--text);transition:background 0.15s}
.modal-btn:hover{background:var(--card2)}
.modal-cancel{width:100%;padding:16px;border:none;background:transparent;font-size:15px;cursor:pointer;color:var(--red);font-weight:700}
.hedef-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10000;padding:1rem}
.hedef-box{background:var(--card);border-radius:20px;padding:1.5rem;width:100%;max-width:300px;border:1px solid var(--border)}
.hedef-box h3{font-size:16px;font-weight:700;margin-bottom:1rem;color:var(--text);text-align:center}
.hedef-box input{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:20px;text-align:center;outline:none;background:var(--card2);color:var(--text)}
.hedef-box input:focus{border-color:var(--green)}
.hedef-box .kaydet-btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.hedef-box .iptal-btn{width:100%;margin-top:8px;padding:12px;border:none;border-radius:12px;background:var(--card2);color:var(--sub);font-size:14px;cursor:pointer}
</style>
</head>

  {isimler:['bal','honey'],birim:'gram',kcal:3.04,p:0.003,k:0.082,y:0},
  {isimler:['dark çikolata','bitter çikolata'],birim:'gram',kcal:5.46,p:0.049,k:0.06,y:0.031},
];

function parseGirdi(girdi){
  if(!girdi||!girdi.trim()) return null;
  const temiz=girdi.trim().toLowerCase().replace('tavuk göğsü','tavuk göğüs');
  let miktar=1,besinAdi=temiz;
  const m1=temiz.match(/^([\d.,]+)\s*(gram|gr|g\b|kg|ml|lt\b|l\b|yemek\s*kaşığı|yk|çay\s*kaşığı|ck|adet|tane|porsiyon|dilim|bardak)\s+(.+)$/);
  const m2=temiz.match(/^([\d.,]+)\s+(.+)$/);
  if(m1){
    miktar=parseFloat(m1[1].replace(',','.'))||1;
    const b=m1[2].trim();
    besinAdi=m1[3].trim();
    if(b==='kg') miktar*=1000;
    if(b==='lt'||b==='l') miktar*=1000;
    if(b==='yemek kaşığı'||b==='yk') miktar*=15;
    if(b==='çay kaşığı'||b==='ck') miktar*=5;
  } else if(m2){miktar=parseFloat(m2[1].replace(',','.'))||1;besinAdi=m2[2].trim();}
  let bulunan=null,enUzun=0;
  for(const b of BESINLER) for(const isim of b.isimler)
    if(besinAdi.includes(isim)&&isim.length>enUzun){bulunan=b;enUzun=isim.length;}
  if(!bulunan) return null;
  return{kcal:Math.round(miktar*bulunan.kcal),p:Math.round(miktar*bulunan.p*10)/10,k:Math.round(miktar*bulunan.k*10)/10,y:Math.round(miktar*bulunan.y*10)/10};
}

function getMonday(d,offset=0){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1)+offset*7);dt.setHours(0,0,0,0);return dt;}
function getWeekDates(offset){const mon=getMonday(new Date(),offset);return DAYS.map((_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
function fmt(d){return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}
function weekKey(o){return getMonday(new Date(),o).toISOString().slice(0,10);}
function getState(){const wk=weekKey(weekOffset);if(!data[wk])data[wk]={meals:{},yemekler:{},photos:{}};return data[wk];}
function getMinWeekOffset(){return Math.round((getMonday(START_DATE,0)-getMonday(new Date(),0))/(7*86400000));}
function changeWeek(d){const minOff=getMinWeekOffset();const next=weekOffset+d;if(next<minOff)return;weekOffset=next;render();}

function getYemekler(di,mi){const st=getState();if(!st.yemekler)st.yemekler={};if(!st.yemekler[`${di}-${mi}`])st.yemekler[`${di}-${mi}`]=[{ad:'',kcal:null,p:null,k:null,y:null}];return st.yemekler[`${di}-${mi}`];}

function yemekEkle(di,mi){
  getYemekler(di,mi).push({ad:'',kcal:null,p:null,k:null,y:null});
  save();render();
  setTimeout(()=>{const inp=document.querySelectorAll(`#ylist-${di}-${mi} .yemek-input`);if(inp.length)inp[inp.length-1].focus();},50);
}
function yemekSil(di,mi,idx){
  const liste=getYemekler(di,mi);liste.splice(idx,1);
  if(liste.length===0)liste.push({ad:'',kcal:null,p:null,k:null,y:null});
  getState().meals[`${di}-${mi}`]=false;save();render();
}
function yemekAdDegis(di,mi,idx,val){
  getYemekler(di,mi)[idx].ad=val;save();
  const chk=document.getElementById(`chk-${di}-${mi}`);
  if(chk&&!getState().meals[`${di}-${mi}`])chk.className='meal-check '+(canCheck(di,mi)?'ready':'locked');
}
function yemekBlur(di,mi,idx,val){
  if(!val.trim())return;
  getYemekler(di,mi)[idx].ad=val;
  const sonuc=parseGirdi(val);
  const el=document.getElementById(`kcal-badge-${di}-${mi}-${idx}`);
  const det=document.getElementById(`det-${di}-${mi}-${idx}`);
  if(sonuc){
    const y=getYemekler(di,mi)[idx];
    y.kcal=sonuc.kcal;y.p=sonuc.p;y.k=sonuc.k;y.y=sonuc.y;save();
    if(el){el.className='kcal-badge';el.textContent='~'+sonuc.kcal+' kcal';}
    if(det)det.innerHTML=`<span class="bd-p">P:${sonuc.p}g</span><span class="bd-k">K:${sonuc.k}g</span><span class="bd-y">Y:${sonuc.y}g</span>`;
  } else {
    if(el){el.className='bilinmiyor';el.textContent='?';}
  }
  kaloriGuncelle();
  mealToplamGuncelle(di,mi);
  const chk=document.getElementById(`chk-${di}-${mi}`);
  if(chk&&!getState().meals[`${di}-${mi}`])chk.className='meal-check '+(canCheck(di,mi)?'ready':'locked');
}

function mealToplamGuncelle(di,mi){
  const liste=getYemekler(di,mi);
  const kcal=liste.reduce((s,y)=>s+(y.kcal||0),0);
  const p=Math.round(liste.reduce((s,y)=>s+(y.p||0),0)*10)/10;
  const k=Math.round(liste.reduce((s,y)=>s+(y.k||0),0)*10)/10;
  const yg=Math.round(liste.reduce((s,y)=>s+(y.y||0),0)*10)/10;
  const wrap=document.getElementById(`meal-toplam-${di}-${mi}`);
  if(!wrap)return;
  if(kcal>0){
    wrap.className='meal-toplam-wrap visible';
    wrap.innerHTML=`<div class="meal-toplam-kcal">⚡ ${kcal} kcal</div>
    <div class="meal-toplam-makro"><span class="bd-p">💪 ${p}g</span><span class="bd-k">⚡ ${k}g</span><span class="bd-y">🥑 ${yg}g</span></div>`;
  } else {wrap.className='meal-toplam-wrap';wrap.innerHTML='';}
}

function kaloriGuncelle(){
  const today=new Date();today.setHours(0,0,0,0);
  // Bugünün hangi haftada ve hangi günde olduğunu bul
  const todayWk=getMonday(today,0).toISOString().slice(0,10);
  const todayDi=(today.getDay()+6)%7; // 0=Pazartesi
  const st=data[todayWk]||{yemekler:{}};
  if(!st.yemekler) st.yemekler={};
  let kcal=0,p=0,k=0,yg=0;
  MEALS.forEach((_,mi)=>{
    const liste=st.yemekler[`${todayDi}-${mi}`]||[];
    liste.forEach(y=>{if(y.kcal)kcal+=y.kcal;if(y.p)p+=y.p;if(y.k)k+=y.k;if(y.y)yg+=y.y;});
  });
  document.getElementById('kalori-toplam').textContent=kcal;
  document.getElementById('hedef-goster').textContent=gunlukHedef;
  document.getElementById('hedef-goster2').textContent=gunlukHedef;
  const pct=Math.min(100,Math.round(kcal/gunlukHedef*100));
  const bar=document.getElementById('kalori-bar');
  bar.style.width=pct+'%';bar.className='kalori-bar-fill'+(kcal>gunlukHedef?' asildi':'');
  document.getElementById('m-protein').textContent=Math.round(p*10)/10+'g';
  document.getElementById('m-karb').textContent=Math.round(k*10)/10+'g';
  document.getElementById('m-yag').textContent=Math.round(yg*10)/10+'g';
  document.getElementById('mb-protein').style.width=Math.min(100,p/1.5)+'%';
  document.getElementById('mb-karb').style.width=Math.min(100,k/2.5)+'%';
  document.getElementById('mb-yag').style.width=Math.min(100,yg/0.7)+'%';
}

    <button class="kaydet-btn" onclick="hedefKaydet()">Kaydet</button>

  gunlukHedef=v;localStorage.setItem('kaloriHedef',v);

function fotografSikistir(dataUrl,cb){
  const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');const max=800;
    let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.7));
  };img.src=dataUrl;
}
function fotoMenuAc(di,mi){
  const old=document.getElementById('foto-ov');if(old)old.remove();
  const ov=document.createElement('div');ov.id='foto-ov';ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal-box">
    <div class="modal-title">Fotoğraf Ekle</div>
    <button class="modal-btn" onclick="fotoSec(${di},${mi},'kamera')"><span style="font-size:24px">📷</span><span>Kamera ile çek</span></button>
    <button class="modal-btn" onclick="fotoSec(${di},${mi},'galeri')"><span style="font-size:24px">🖼️</span><span>Galeriden seç</span></button>
    <button class="modal-cancel" onclick="document.getElementById('foto-ov').remove()">İptal</button>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
function fotoSec(di,mi,kaynak){
  const ov=document.getElementById('foto-ov');if(ov)ov.remove();
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  if(kaynak==='kamera')inp.setAttribute('capture','environment');
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>fotografSikistir(ev.target.result,s=>{getState().photos[`${di}-${mi}`]=s;save();render();});
    r.readAsDataURL(file);
  };inp.click();
}
function removePhoto(di,mi){delete getState().photos[`${di}-${mi}`];save();render();}
function openLightbox(src){
  const lb=document.createElement('div');lb.className='lightbox';
  lb.innerHTML=`<img src="${src}">`;lb.onclick=()=>lb.remove();
  document.body.appendChild(lb);
}

// Fotoğraf artık zorunlu değil — sadece yemek adı yeterli
function canCheck(di,mi){return getYemekler(di,mi).some(y=>y.ad.trim());}

function tryToggleMeal(di,mi){
  const st=getState();const k=`${di}-${mi}`;const was=!!st.meals[k];
  if(was){st.meals[k]=false;save();render();return;}
  if(!canCheck(di,mi)){shakeCheck(di,mi);showHint(di,mi);return;}
  st.meals[k]=true;save();playMealSound();triggerFX(di,mi);
  setTimeout(()=>checkDayComplete(di),100);render();
}
function shakeCheck(di,mi){
  const el=document.getElementById(`chk-${di}-${mi}`);if(!el)return;
  const seq=[6,-6,6,-6,0];let i=0;
  const run=()=>{if(i>=seq.length){el.style.transform='';return;}el.style.transform=`translateX(${seq[i]}px)`;i++;setTimeout(run,55);};run();
}
function showHint(di,mi){
  const el=document.getElementById(`hint-${di}-${mi}`);
  if(el){el.textContent='Önce en az bir yemek ekle';el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2500);}
}
function checkDayComplete(di){
  if(MEALS.every((_,mi)=>!!getState().meals[`${di}-${mi}`])){setTimeout(()=>{bigBurst(di);playDayCompleteSound();},80);}
}

function render(){
  const minOff=getMinWeekOffset();
  document.getElementById('prev-btn').disabled=(weekOffset<=minOff);
  const dates=getWeekDates(weekOffset);
  const mon=getMonday(new Date(),weekOffset);
  const end=new Date(mon);end.setDate(mon.getDate()+6);
  document.getElementById('week-label').textContent=fmt(mon)+' – '+fmt(end);
  const st=getState();
  let total=0,done=0;
  dates.forEach((date,di)=>{if(date<START_DATE)return;MEALS.forEach((_,mi)=>{total++;if(st.meals[`${di}-${mi}`])done++;});});
  document.getElementById('prog-text').textContent=`${done} / ${total}`;
  document.getElementById('prog-fill').style.width=total>0?(done/total*100)+'%':'0%';
  document.getElementById('streak-badge').textContent=`🔥 ${calcStreak()} gün`;

  const grid=document.getElementById('days-grid');grid.innerHTML='';
  dates.forEach((date,di)=>{
    if(date<START_DATE)return;
    const dayDone=MEALS.every((_,mi)=>!!st.meals[`${di}-${mi}`]);
    const dayDoneCount=MEALS.filter((_,mi)=>!!st.meals[`${di}-${mi}`]).length;
    const card=document.createElement('div');
    card.className='day-card'+(dayDone?' day-done':'');
    const dotsHTML=MEALS.map((_,mi)=>`<div class="mini-dot${st.meals[`${di}-${mi}`]?' done':''}"></div>`).join('');
    const pct=Math.round(dayDoneCount/MEALS.length*100);

    const mealsHTML=MEALS.map((m,mi)=>{
      const checked=!!st.meals[`${di}-${mi}`];
      const photo=st.photos[`${di}-${mi}`];
      const lockClass=checked?'checked':canCheck(di,mi)?'ready':'locked';
      const liste=getYemekler(di,mi);
      const tKcal=liste.reduce((s,y)=>s+(y.kcal||0),0);
      const tP=Math.round(liste.reduce((s,y)=>s+(y.p||0),0)*10)/10;
      const tK=Math.round(liste.reduce((s,y)=>s+(y.k||0),0)*10)/10;
      const tY=Math.round(liste.reduce((s,y)=>s+(y.y||0),0)*10)/10;

      const yemeklerHTML=liste.map((y,idx)=>`
        <div class="yemek-satir">
          <input class="yemek-input${checked?' done-input':''}" placeholder="örn: 3 yumurta, 150 tavuk göğüs"
            value="${(y.ad||'').replace(/"/g,'&quot;')}"
            oninput="yemekAdDegis(${di},${mi},${idx},this.value)"
            onblur="yemekBlur(${di},${mi},${idx},this.value)">
          <span id="kcal-badge-${di}-${mi}-${idx}" class="${y.kcal?'kcal-badge':''}">${y.kcal?'~'+y.kcal+' kcal':''}</span>
          <button class="sil-btn" onclick="yemekSil(${di},${mi},${idx})">✕</button>
        </div>
        <div class="besin-detay" id="det-${di}-${mi}-${idx}">
          ${y.p!=null?`<span class="bd-p">P:${y.p}g</span><span class="bd-k">K:${y.k}g</span><span class="bd-y">Y:${y.y}g</span>`:''}
        </div>`).join('');

      const photoHTML=photo
        ?`<div class="photo-thumb-wrap"><img class="photo-thumb" src="${photo}" onclick="openLightbox('${photo}')"><button class="photo-del" onclick="removePhoto(${di},${mi})">✕</button></div>`
        :`<div class="photo-cam-btn" onclick="fotoMenuAc(${di},${mi})">📷 Fotoğraf ekle (isteğe bağlı)</div>`;

      return `<div class="meal-block">
        <div class="meal-block-header">
          <div class="meal-check ${lockClass}" id="chk-${di}-${mi}" onclick="tryToggleMeal(${di},${mi})"></div>
          <span class="meal-emoji">${MEAL_EMOJIS[mi]}</span>
          <span class="meal-label">${m}</span>
        </div>
        <div class="yemek-listesi" id="ylist-${di}-${mi}">${yemeklerHTML}</div>
        ${!checked?`<button class="ekle-btn" onclick="yemekEkle(${di},${mi})">+ Yemek ekle</button>`:''}
        <div class="meal-toplam-wrap${tKcal>0?' visible':''}" id="meal-toplam-${di}-${mi}">
          ${tKcal>0?`<div class="meal-toplam-kcal">⚡ ${tKcal} kcal</div>
          <div class="meal-toplam-makro"><span class="bd-p">💪 ${tP}g</span><span class="bd-k">⚡ ${tK}g</span><span class="bd-y">🥑 ${tY}g</span></div>`:''}
        </div>
        <div class="photo-area">${photoHTML}</div>
        <span class="hint" id="hint-${di}-${mi}" style="opacity:0"></span>
      </div>`;
    }).join('');

    card.innerHTML=`
      <div class="day-header">
        <div class="day-left">
          <span class="day-name">${DAYS[di]}</span>
          ${isToday(date)?'<span class="today-badge">bugün</span>':''}
          <span class="day-date">${fmt(date)}</span>
        </div>
        <div class="day-right">
          <div class="day-mini">${dotsHTML}</div>
          <span class="day-pct">${pct}%</span>
        </div>
      </div>
      <div class="day-meals">${mealsHTML}</div>`;
    grid.appendChild(card);
  });
  kaloriGuncelle();
}

function calcStreak(){
  let streak=0;const today=new Date();today.setHours(0,0,0,0);let check=new Date(today);
  while(true){
    if(check<START_DATE)break;
    const wk=getMonday(check,0).toISOString().slice(0,10);
    const st=data[wk]||{meals:{}};const di=(check.getDay()+6)%7;
    if(MEALS.every((_,mi)=>!!st.meals[`${di}-${mi}`]))streak++;
    else if(check<today)break;
    check.setDate(check.getDate()-1);if(streak>365)break;
  }
  return streak;
}

function playMealSound(){
  try{const ac=new AudioContext();const t=ac.currentTime;
  [[880,0.22,0.55,0],[1760,0.07,0.3,0],[2637,0.04,0.18,0.01]].forEach(([f,v,d,dl])=>{
    const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);
    const s=t+dl;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.01);g.gain.exponentialRampToValueAtTime(0.0001,s+d);o.start(s);o.stop(s+d+0.05);
  });setTimeout(()=>ac.close(),800);}catch(e){}
}
function playDayCompleteSound(){
  try{const ac=new AudioContext();const t=ac.currentTime;
  function note(f,s,d,v=0.18,type='sine'){const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0,t+s);g.gain.linearRampToValueAtTime(v,t+s+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+s+d);o.start(t+s);o.stop(t+s+d+0.05);}
  [[523.25,0,0.35,0.16],[659.25,0.22,0.35,0.18],[783.99,0.44,0.40,0.20],[1046.5,0.66,0.90,0.22]].forEach(([f,s,d,v])=>note(f,s,d,v));
  [[1046.5,0,0.25,0.06],[1318.5,0.22,0.25,0.06],[1568,0.44,0.28,0.06],[2093,0.66,0.60,0.06]].forEach(([f,s,d,v])=>note(f,s,d,v));
  note(130.81,0,0.5,0.12,'triangle');note(130.81,0.66,1.0,0.14,'triangle');note(2093,0.66,0.4,0.05);note(1046.5,1.0,1.8,0.08);note(523.25,1.0,2.0,0.06);
  setTimeout(()=>ac.close(),4000);}catch(e){}
}

const fxCanvas=document.createElement('canvas');
fxCanvas.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999';
document.body.appendChild(fxCanvas);
const fxCtx=fxCanvas.getContext('2d');
let particles=[],animating=false;
function resizeFx(){fxCanvas.width=window.innerWidth;fxCanvas.height=window.innerHeight;}
window.addEventListener('resize',resizeFx);resizeFx();
function triggerFX(di,mi){const el=document.getElementById(`chk-${di}-${mi}`);if(!el)return;const r=el.getBoundingClientRect();spawnFX(r.left+r.width/2,r.top+r.height/2,'confetti',22);if(!animating)animate();}
function bigBurst(di){const cards=document.querySelectorAll('.day-card');const dates=getWeekDates(weekOffset);const vis=dates.map((d,i)=>({date:d,di:i})).filter(x=>x.date>=START_DATE);const ci=vis.findIndex(x=>x.di===di);if(ci<0||ci>=cards.length)return;const r=cards[ci].getBoundingClientRect();spawnFX(r.left+r.width/2,r.top+r.height/2,'confetti',80);spawnFX(r.left+r.width/2,r.top+r.height/2,'stars',40);if(!animating)animate();}
function spawnFX(cx,cy,type,count){const colors=['#1D9E75','#EF9F27','#378ADD','#D4537E','#E24B4A','#7F77DD','#5DCAA5'];for(let i=0;i<count;i++){const angle=Math.random()*Math.PI*2,speed=2+Math.random()*6;particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:0.013+Math.random()*0.018,size:type==='stars'?4:4+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],type,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.25,shape:['rect','circle','tri'][Math.floor(Math.random()*3)]});}}
function animate(){animating=true;fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.vx*=0.98;p.life-=p.decay;p.rot+=p.rotV;if(p.life<=0)return false;fxCtx.save();fxCtx.globalAlpha=p.life;fxCtx.translate(p.x,p.y);fxCtx.rotate(p.rot);fxCtx.fillStyle=p.color;if(p.type==='stars'){drawStar(fxCtx,0,0,p.size);}else if(p.shape==='circle'){fxCtx.beginPath();fxCtx.arc(0,0,p.size/2,0,Math.PI*2);fxCtx.fill();}else if(p.shape==='tri'){fxCtx.beginPath();fxCtx.moveTo(0,-p.size/2);fxCtx.lineTo(p.size/2,p.size/2);fxCtx.lineTo(-p.size/2,p.size/2);fxCtx.closePath();fxCtx.fill();}else{fxCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}fxCtx.restore();return true;});if(particles.length>0)requestAnimationFrame(animate);else animating=false;}
function drawStar(c,x,y,r){c.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;if(i===0)c.moveTo(x+Math.cos(a)*r,y-Math.sin(a)*r);else c.lineTo(x+Math.cos(a)*r,y-Math.sin(a)*r);c.lineTo(x+Math.cos(b)*r*0.4,y-Math.sin(b)*r*0.4);}c.closePath();c.fill();}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/service-worker.js');
render();
</script>
