function parseGirdi(girdi){
  if(!girdi||!girdi.trim()) return null;
  const temiz=girdi.trim().toLowerCase()
    .replace('tavuk göğsü','tavuk göğüs');
  let miktar=1,besinAdi=temiz;
  const m1=temiz.match(/^([\d.,]+)\s*(gram|gr|g\b|kg|ml|lt\b|l\b|yemek\s*kaşığı|yk|çay\s*kaşığı|ck|adet|tane|porsiyon|dilim|bardak)\s+(.+)$/);
  const m2=temiz.match(/^([\d.,]+)\s+(.+)$/);
  if(m1){
    miktar=parseFloat(m1[1].replace(',','.'))||1;
    const birim=m1[2].trim();
    besinAdi=m1[3].trim();
    if(birim==='kg') miktar*=1000;
    if(birim==='lt'||birim==='l') miktar*=1000;
    if(birim==='yemek kaşığı'||birim==='yk') miktar*=15;
    if(birim==='çay kaşığı'||birim==='ck') miktar*=5;
  } else if(m2){
    miktar=parseFloat(m2[1].replace(',','.'))||1;
    besinAdi=m2[2].trim();
  }
  let bulunan=null,enUzun=0;
  for(const b of BESINLER){
    for(const isim of b.isimler){
      if(besinAdi.includes(isim)&&isim.length>enUzun){bulunan=b;enUzun=isim.length;}
    }
  }
  if(!bulunan) return null;
  return {
    kcal:Math.round(miktar*bulunan.kcal),
    p:Math.round(miktar*bulunan.p*10)/10,
    k:Math.round(miktar*bulunan.k*10)/10,
    y:Math.round(miktar*bulunan.y*10)/10,
  };
}

// ── TARİH ──
function getMonday(d,offset=0){
  const dt=new Date(d);const day=dt.getDay();
  const diff=dt.getDate()-(day===0?6:day-1);
  dt.setDate(diff+offset*7);dt.setHours(0,0,0,0);return dt;
}
function getWeekDates(offset){
  const mon=getMonday(new Date(),offset);
  return DAYS.map((_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
function fmt(d){return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}
function weekKey(offset){return getMonday(new Date(),offset).toISOString().slice(0,10);}
function getState(){const wk=weekKey(weekOffset);if(!data[wk])data[wk]={meals:{},yemekler:{},photos:{}};return data[wk];}
function getMinWeekOffset(){
  const todayMon=getMonday(new Date(),0);const startMon=getMonday(START_DATE,0);
  return Math.round((startMon-todayMon)/(7*86400000));
}
function changeWeek(d){
  const minOff=getMinWeekOffset();const next=weekOffset+d;
  if(next<minOff) return;weekOffset=next;render();
}

// ── YEMEK LİSTESİ ──
function getYemekler(di,mi){
  const st=getState();
  if(!st.yemekler) st.yemekler={};
  if(!st.yemekler[`${di}-${mi}`]) st.yemekler[`${di}-${mi}`]=[{ad:'',kcal:null,p:null,k:null,y:null}];
  return st.yemekler[`${di}-${mi}`];
}
function yemekEkle(di,mi){
  getYemekler(di,mi).push({ad:'',kcal:null,p:null,k:null,y:null});
  save();render();
  setTimeout(()=>{
    const inputs=document.querySelectorAll(`#ylist-${di}-${mi} .yemek-input`);
    if(inputs.length) inputs[inputs.length-1].focus();
  },50);
}
function yemekSil(di,mi,idx){
  const liste=getYemekler(di,mi);
  liste.splice(idx,1);
  if(liste.length===0) liste.push({ad:'',kcal:null,p:null,k:null,y:null});
  getState().meals[`${di}-${mi}`]=false;
  save();render();
}
function yemekAdDegis(di,mi,idx,val){
  getYemekler(di,mi)[idx].ad=val;
  save();
  const chk=document.getElementById(`chk-${di}-${mi}`);
  if(chk&&!getState().meals[`${di}-${mi}`]){
    chk.className='meal-check '+(canCheck(di,mi)?'ready':'locked');
  }
}
function yemekBlur(di,mi,idx,val){
  if(!val.trim()) return;
  getYemekler(di,mi)[idx].ad=val;
  const sonuc=parseGirdi(val);
  if(sonuc){
    const y=getYemekler(di,mi)[idx];
    y.kcal=sonuc.kcal;y.p=sonuc.p;y.k=sonuc.k;y.y=sonuc.y;
    save();
    // Badge güncelle
    const el=document.getElementById(`kcal-badge-${di}-${mi}-${idx}`);
    if(el){el.className='kcal-badge';el.textContent='~'+sonuc.kcal+' kcal';}
    // Detay güncelle
    const det=document.getElementById(`det-${di}-${mi}-${idx}`);
    if(det){
      det.innerHTML=`<span class="bd-p">P: ${sonuc.p}g</span><span class="bd-k">K: ${sonuc.k}g</span><span class="bd-y">Y: ${sonuc.y}g</span>`;
    }
    kaloriGuncelle();
    mealToplamGuncelle(di,mi);
    const chk=document.getElementById(`chk-${di}-${mi}`);
    if(chk&&!getState().meals[`${di}-${mi}`]){
      chk.className='meal-check '+(canCheck(di,mi)?'ready':'locked');
    }
  } else {
    const el=document.getElementById(`kcal-badge-${di}-${mi}-${idx}`);
    if(el){el.className='';el.textContent='bilinmiyor';}
  }
}

function mealToplamGuncelle(di,mi){
  const liste=getYemekler(di,mi);
  const kcal=liste.reduce((s,y)=>s+(y.kcal||0),0);
  const p=liste.reduce((s,y)=>s+(y.p||0),0);
  const k=liste.reduce((s,y)=>s+(y.k||0),0);
  const yg=liste.reduce((s,y)=>s+(y.y||0),0);
  const wrap=document.getElementById(`meal-toplam-${di}-${mi}`);
  if(!wrap) return;
  if(kcal>0){
    wrap.className='meal-toplam-wrap visible';
    wrap.innerHTML=`<div class="meal-toplam-kcal">Toplam: ${kcal} kcal</div>
    <div class="meal-toplam-makro">
      <span class="bd-p">P: ${Math.round(p*10)/10}g</span>
      <span class="bd-k">K: ${Math.round(k*10)/10}g</span>
      <span class="bd-y">Y: ${Math.round(yg*10)/10}g</span>
    </div>`;
  } else {
    wrap.className='meal-toplam-wrap';wrap.innerHTML='';
  }
}

// ── KALORİ & MAKRO BAR ──
function kaloriGuncelle(){
  document.getElementById('hedef-goster').textContent=gunlukHedef;
  document.getElementById('kalori-hedef-alt').textContent=gunlukHedef+' kcal hedef';
  const today=new Date();today.setHours(0,0,0,0);
  const dates=getWeekDates(weekOffset);
  let kcal=0,p=0,k=0,yg=0;
  dates.forEach((date,di)=>{
    const d2=new Date(date);d2.setHours(0,0,0,0);
    if(d2.getTime()!==today.getTime()) return;
    MEALS.forEach((_,mi)=>{
      getYemekler(di,mi).forEach(y=>{
        if(y.kcal) kcal+=y.kcal;
        if(y.p) p+=y.p;
        if(y.k) k+=y.k;
        if(y.y) yg+=y.y;
      });
    });
  });
  document.getElementById('kalori-toplam').textContent=kcal;
  const pct=Math.min(100,Math.round(kcal/gunlukHedef*100));
  const bar=document.getElementById('kalori-bar');
  bar.style.width=pct+'%';
  bar.className='kalori-bar-fill'+(kcal>gunlukHedef?' asildi':'');
  document.getElementById('m-protein').textContent=Math.round(p*10)/10+'g';
  document.getElementById('m-karb').textContent=Math.round(k*10)/10+'g';
  document.getElementById('m-yag').textContent=Math.round(yg*10)/10+'g';
  // Makro barları (hedef: P=150g, K=250g, Y=70g)
  document.getElementById('mb-protein').style.width=Math.min(100,p/1.5)+'%';
  document.getElementById('mb-karb').style.width=Math.min(100,k/2.5)+'%';
  document.getElementById('mb-yag').style.width=Math.min(100,yg/0.7)+'%';
}
function hedefAc(){
  const modal=document.createElement('div');modal.className='hedef-modal';
  modal.innerHTML=`<div class="hedef-box">
    <h3>Günlük kalori hedefi</h3>
    <input type="number" id="hedef-input" value="${gunlukHedef}" min="500" max="9999">
    <button onclick="hedefKaydet()">Kaydet</button>
    <button class="iptal" onclick="this.closest('.hedef-modal').remove()">İptal</button>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('hedef-input').focus(),100);
}
function hedefKaydet(){
  const v=parseInt(document.getElementById('hedef-input').value);
  if(!v||v<500) return;
  gunlukHedef=v;localStorage.setItem('kaloriHedef',v);
  document.querySelector('.hedef-modal').remove();
  kaloriGuncelle();
}

// ── FOTOĞRAF ──
function fotografSikistir(dataUrl,callback){
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    const max=800;let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    callback(canvas.toDataURL('image/jpeg',0.7));
  };img.src=dataUrl;
}
function fotoMenuAc(di,mi){
  const old=document.getElementById('foto-menu-overlay');if(old) old.remove();
  const overlay=document.createElement('div');
  overlay.id='foto-menu-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:10000;padding:1rem';
  overlay.innerHTML=`<div style="background:#fff;border-radius:16px;width:100%;max-width:400px;overflow:hidden;margin-bottom:8px">
    <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#999;text-align:center">Fotoğraf ekle</div>
    <button onclick="fotoSec(${di},${mi},'kamera')" style="width:100%;padding:16px;border:none;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0"><span style="font-size:22px">📷</span> Kamera ile çek</button>
    <button onclick="fotoSec(${di},${mi},'galeri')" style="width:100%;padding:16px;border:none;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0"><span style="font-size:22px">🖼️</span> Galeriden seç</button>
    <button onclick="document.getElementById('foto-menu-overlay').remove()" style="width:100%;padding:16px;border:none;background:#f8f8f8;font-size:16px;cursor:pointer;color:#E24B4A;font-weight:600">İptal</button>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay) overlay.remove();};
  document.body.appendChild(overlay);
}
function fotoSec(di,mi,kaynak){
  const overlay=document.getElementById('foto-menu-overlay');if(overlay) overlay.remove();
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  if(kaynak==='kamera') inp.setAttribute('capture','environment');
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      fotografSikistir(ev.target.result,(s)=>{
        getState().photos[`${di}-${mi}`]=s;save();render();
      });
    };
    reader.readAsDataURL(file);
  };inp.click();
}
function removePhoto(di,mi){
  delete getState().photos[`${di}-${mi}`];
  getState().meals[`${di}-${mi}`]=false;
  save();render();
}
function openLightbox(src){
  const lb=document.createElement('div');lb.className='lightbox';
  lb.innerHTML=`<img src="${src}">`;lb.onclick=()=>lb.remove();
  document.body.appendChild(lb);
}

// ── KİLİT ──
function canCheck(di,mi){
  return getYemekler(di,mi).some(y=>y.ad.trim())&&!!getState().photos[`${di}-${mi}`];
}
function tryToggleMeal(di,mi){
  const st=getState();const k=`${di}-${mi}`;const was=!!st.meals[k];
  if(was){st.meals[k]=false;save();render();return;}
  if(!canCheck(di,mi)){shakeCheck(di,mi);showHint(di,mi);return;}
  st.meals[k]=true;save();
  playMealSound();triggerFX(di,mi);
  setTimeout(()=>checkDayComplete(di),100);
  render();
}
function shakeCheck(di,mi){
  const el=document.getElementById(`chk-${di}-${mi}`);if(!el) return;
  const seq=[6,-6,6,-6,0];let i=0;
  const run=()=>{if(i>=seq.length){el.style.transform='';return;}el.style.transform=`translateX(${seq[i]}px)`;i++;setTimeout(run,55);};run();
}
function showHint(di,mi){
  const hasYemek=getYemekler(di,mi).some(y=>y.ad.trim());
  const hasPhoto=!!getState().photos[`${di}-${mi}`];
  const msg=!hasYemek&&!hasPhoto?'Önce yemek ekle ve fotoğraf çek':!hasYemek?'Önce en az bir yemek ekle':'Önce fotoğraf çek';
  const el=document.getElementById(`hint-${di}-${mi}`);
  if(el){el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2500);}
}
function checkDayComplete(di){
  if(MEALS.every((_,mi)=>!!getState().meals[`${di}-${mi}`])){
    setTimeout(()=>{bigBurst(di);playDayCompleteSound();},80);
  }
}

// ── RENDER ──
function render(){
  const minOff=getMinWeekOffset();
  document.getElementById('prev-btn').disabled=(weekOffset<=minOff);
  const dates=getWeekDates(weekOffset);
  const mon=getMonday(new Date(),weekOffset);
  const end=new Date(mon);end.setDate(mon.getDate()+6);
  document.getElementById('week-label').textContent=fmt(mon)+' – '+fmt(end);
  const st=getState();
  let total=0,done=0;
  dates.forEach((date,di)=>{
    if(date<START_DATE) return;
    MEALS.forEach((_,mi)=>{total++;if(st.meals[`${di}-${mi}`])done++;});
  });
  document.getElementById('prog-text').textContent=`${done} / ${total}`;
  document.getElementById('prog-fill').style.width=total>0?(done/total*100)+'%':'0%';
  document.getElementById('streak-badge').textContent=`🔥 ${calcStreak()} gün seri`;

  const grid=document.getElementById('days-grid');grid.innerHTML='';
  dates.forEach((date,di)=>{
    if(date<START_DATE) return;
    const dayDone=MEALS.every((_,mi)=>!!st.meals[`${di}-${mi}`]);
    const dayDoneCount=MEALS.filter((_,mi)=>!!st.meals[`${di}-${mi}`]).length;
    const card=document.createElement('div');
    card.className='day-card'+(dayDone?' day-done':'');
    const dotsHTML=MEALS.map((_,mi)=>`<div class="mini-dot${st.meals[`${di}-${mi}`]?' done':''}"></div>`).join('');
    const pct=Math.round(dayDoneCount/MEALS.length*100);

    const mealsHTML=MEALS.map((m,mi)=>{
      const checked=!!st.meals[`${di}-${mi}`];
      const photo=st.photos[`${di}-${mi}`];
      const lockClass=checked?'checked':canCheck(di,mi)?'ready':'locked';
      const liste=getYemekler(di,mi);
      const toplamKcal=liste.reduce((s,y)=>s+(y.kcal||0),0);
      const toplamP=Math.round(liste.reduce((s,y)=>s+(y.p||0),0)*10)/10;
      const toplamK=Math.round(liste.reduce((s,y)=>s+(y.k||0),0)*10)/10;
      const toplamY=Math.round(liste.reduce((s,y)=>s+(y.y||0),0)*10)/10;

      const yemeklerHTML=liste.map((y,idx)=>`
        <div class="yemek-satir">
          <input class="yemek-input${checked?' done-input':''}" placeholder="örn: 3 yumurta, 150 tavuk göğüs" value="${(y.ad||'').replace(/"/g,'&quot;')}"
            oninput="yemekAdDegis(${di},${mi},${idx},this.value)"
            onblur="yemekBlur(${di},${mi},${idx},this.value)">
          <span id="kcal-badge-${di}-${mi}-${idx}" class="${y.kcal?'kcal-badge':''}">${y.kcal?'~'+y.kcal+' kcal':''}</span>
          <button class="sil-btn" onclick="yemekSil(${di},${mi},${idx})">✕</button>
        </div>
        <div class="besin-detay" id="det-${di}-${mi}-${idx}">
          ${y.p!=null?`<span class="bd-p">P: ${y.p}g</span><span class="bd-k">K: ${y.k}g</span><span class="bd-y">Y: ${y.y}g</span>`:''}
        </div>`).join('');

      const photoHTML=photo
        ?`<div class="photo-thumb-wrap"><img class="photo-thumb" src="${photo}" onclick="openLightbox('${photo}')"><button class="photo-del" onclick="removePhoto(${di},${mi})">✕</button></div>`
        :`<div class="photo-cam-btn" onclick="fotoMenuAc(${di},${mi})"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="10" rx="2"/><circle cx="8" cy="9" r="2.8"/><path d="M5.5 4l1-2h3l1 2"/></svg>Fotoğraf ekle</div>`;

      return `<div class="meal-block">
        <div class="meal-block-header">
          <div class="meal-check ${lockClass}" id="chk-${di}-${mi}" onclick="tryToggleMeal(${di},${mi})"></div>
          <span class="meal-label">${m}</span>
        </div>
        <div class="yemek-listesi" id="ylist-${di}-${mi}">${yemeklerHTML}</div>
        ${!checked?`<button class="ekle-btn" onclick="yemekEkle(${di},${mi})">+ Yemek ekle</button>`:''}
        <div class="meal-toplam-wrap${toplamKcal>0?' visible':''}" id="meal-toplam-${di}-${mi}">
          ${toplamKcal>0?`<div class="meal-toplam-kcal">Toplam: ${toplamKcal} kcal</div>
          <div class="meal-toplam-makro"><span class="bd-p">P: ${toplamP}g</span><span class="bd-k">K: ${toplamK}g</span><span class="bd-y">Y: ${toplamY}g</span></div>`:''}
        </div>
        <div class="photo-area">${photoHTML}</div>
        <div style="min-height:16px"><span class="hint" id="hint-${di}-${mi}" style="opacity:0"></span></div>
      </div>`;
    }).join('');

    card.innerHTML=`
      <div class="day-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="day-name">${DAYS[di]}</span>
          ${isToday(date)?'<span class="today-badge">bugün</span>':''}
          <span style="font-size:12px;color:#aaa">${fmt(date)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="day-mini">${dotsHTML}</div>
          <span class="day-pct">${pct}%</span>
        </div>
      </div>
      <div class="day-meals">${mealsHTML}</div>`;
    grid.appendChild(card);
  });
  kaloriGuncelle();
}

function calcStreak(){
  let streak=0;const today=new Date();today.setHours(0,0,0,0);let check=new Date(today);
  while(true){
    if(check<START_DATE) break;
    const mon=getMonday(check,0);const wk=mon.toISOString().slice(0,10);
    const st=data[wk]||{meals:{}};const di=(check.getDay()+6)%7;
    if(MEALS.every((_,mi)=>!!st.meals[`${di}-${mi}`])) streak++;
    else if(check<today) break;
    check.setDate(check.getDate()-1);if(streak>365) break;
  }
  return streak;
}

// ── SES ──
function playMealSound(){
  try{
    const ac=new AudioContext();const t=ac.currentTime;
    [[880,0.22,0.55,0],[1760,0.07,0.3,0],[2637,0.04,0.18,0.01]].forEach(([f,v,d,delay])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);
      const s=t+delay;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,s+d);o.start(s);o.stop(s+d+0.05);
    });
    setTimeout(()=>ac.close(),800);
  }catch(e){}
}
function playDayCompleteSound(){
  try{
    const ac=new AudioContext();const t=ac.currentTime;
    function note(f,s,d,v=0.18,type='sine'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.type=type;o.frequency.value=f;o.connect(g);g.connect(ac.destination);
      g.gain.setValueAtTime(0,t+s);g.gain.linearRampToValueAtTime(v,t+s+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+s+d);o.start(t+s);o.stop(t+s+d+0.05);
    }
    [[523.25,0,0.35,0.16],[659.25,0.22,0.35,0.18],[783.99,0.44,0.40,0.20],[1046.5,0.66,0.90,0.22]].forEach(([f,s,d,v])=>note(f,s,d,v));
    [[1046.5,0,0.25,0.06],[1318.5,0.22,0.25,0.06],[1568,0.44,0.28,0.06],[2093,0.66,0.60,0.06]].forEach(([f,s,d,v])=>note(f,s,d,v));
    note(130.81,0,0.5,0.12,'triangle');note(130.81,0.66,1.0,0.14,'triangle');
    note(2093,0.66,0.4,0.05);note(1046.5,1.0,1.8,0.08);note(523.25,1.0,2.0,0.06);
    setTimeout(()=>ac.close(),4000);
  }catch(e){}
}

// ── FX ──
const fxCanvas=document.createElement('canvas');
fxCanvas.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999';
document.body.appendChild(fxCanvas);
const fxCtx=fxCanvas.getContext('2d');
let particles=[];let animating=false;
function resizeFx(){fxCanvas.width=window.innerWidth;fxCanvas.height=window.innerHeight;}
window.addEventListener('resize',resizeFx);resizeFx();
function triggerFX(di,mi){
  const el=document.getElementById(`chk-${di}-${mi}`);if(!el) return;
  const r=el.getBoundingClientRect();
  spawnFX(r.left+r.width/2,r.top+r.height/2,'confetti',22);
  if(!animating) animate();
}
function bigBurst(di){
  const cards=document.querySelectorAll('.day-card');
  const dates=getWeekDates(weekOffset);
  const visible=dates.map((d,i)=>({date:d,di:i})).filter(x=>x.date>=START_DATE);
  const ci=visible.findIndex(x=>x.di===di);
  if(ci<0||ci>=cards.length) return;
  const r=cards[ci].getBoundingClientRect();
  spawnFX(r.left+r.width/2,r.top+r.height/2,'confetti',80);
  spawnFX(r.left+r.width/2,r.top+r.height/2,'stars',40);
  if(!animating) animate();
}
function spawnFX(cx,cy,type,count){
  const colors=['#1D9E75','#EF9F27','#378ADD','#D4537E','#E24B4A','#7F77DD','#5DCAA5'];
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2,speed=2+Math.random()*6;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,decay:0.013+Math.random()*0.018,size:type==='stars'?4:4+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],type,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.25,
      shape:['rect','circle','tri'][Math.floor(Math.random()*3)]});
  }
}
function animate(){
  animating=true;fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.vx*=0.98;p.life-=p.decay;p.rot+=p.rotV;
    if(p.life<=0) return false;
    fxCtx.save();fxCtx.globalAlpha=p.life;fxCtx.translate(p.x,p.y);fxCtx.rotate(p.rot);fxCtx.fillStyle=p.color;
    if(p.type==='stars'){drawStar(fxCtx,0,0,p.size);}
    else if(p.shape==='circle'){fxCtx.beginPath();fxCtx.arc(0,0,p.size/2,0,Math.PI*2);fxCtx.fill();}
    else if(p.shape==='tri'){fxCtx.beginPath();fxCtx.moveTo(0,-p.size/2);fxCtx.lineTo(p.size/2,p.size/2);fxCtx.lineTo(-p.size/2,p.size/2);fxCtx.closePath();fxCtx.fill();}
    else{fxCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
    fxCtx.restore();return true;
  });
  if(particles.length>0) requestAnimationFrame(animate);else animating=false;
}
function drawStar(c,x,y,r){
  c.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;
    if(i===0) c.moveTo(x+Math.cos(a)*r,y-Math.sin(a)*r);
    else c.lineTo(x+Math.cos(a)*r,y-Math.sin(a)*r);
    c.lineTo(x+Math.cos(b)*r*0.4,y-Math.sin(b)*r*0.4);
  }
  c.closePath();c.fill();
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}
render();
</script>
